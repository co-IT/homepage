name: 🚀 Deployment of co-IT.eu

on:
  workflow_dispatch:
  push:
    branches: ['main', 'beta']

env:
  CANONICAL_DOMAIN: co-it.eu
  IMAGE_NAME: ghcr.io/co-it/homepage
  IS_DEFAULT_BRANCH: ${{ github.ref_name == github.event.repository.default_branch && true || false }}
  GIT_SHA: ${{ github.sha }}
  GIT_REF_NAME: ${{ github.ref_name }}

jobs:
  docker-image:
    runs-on:
      - self-hosted
      - Linux
    permissions:
      packages: write
      contents: read

    outputs:
      instance: >-
        ${{ fromJson(steps.meta.outputs.json).labels['org.opencontainers.image.title'] }}-${{ fromJson(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
      docker-image: ${{ fromJson(steps.meta.outputs.json).tags[0] }}
      domain: ${{ fromJson(steps.meta.outputs.json).labels.domain }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: $
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Traefik base rules when building the default branch
        if: env.IS_DEFAULT_BRANCH == 'true'
        run: |
          printf 'DOMAIN=domain=%s\n' '${{ env.CANONICAL_DOMAIN }}' >> "$GITHUB_ENV"
          printf 'ORIGIN=%s\n' '${{ env.CANONICAL_DOMAIN }}' >> "$GITHUB_ENV"

          {
            printf 'PUBLIC_SEO_EXCLUDED_ROUTES<<EOF\n'
            printf  '/kontrakte/,'
            printf '/cyber/*,'
            printf '/produkte/passwort-manager/\n'
            printf 'EOF\n'
          } >> "$GITHUB_ENV"

          {
            printf 'BASE_RULES<<EOF\n'

            printf 'traefik.http.routers.%s-%s.rule=Host(`%s`)\n' \
                    '${{ github.event.repository.name }}' \
                    '${{ github.ref_name }}' \
                    '${{ env.CANONICAL_DOMAIN }}'

            printf 'EOF\n'
          } >> "$GITHUB_ENV"

      - name: Build Traefik base rules when building a non-default branch
        if: env.IS_DEFAULT_BRANCH != 'true'
        run: |
          printf 'DOMAIN=domain=beta.%s\n' '${{ env.CANONICAL_DOMAIN }}' >> "$GITHUB_ENV"
          printf 'ORIGIN=beta.%s\n' '${{ env.CANONICAL_DOMAIN }}' >> "$GITHUB_ENV"

          {
            printf 'PUBLIC_SEO_EXCLUDED_ROUTES<<EOF\n'
            printf  '/*\n'
            printf 'EOF\n'
          } >> "$GITHUB_ENV"

          {
            printf 'BASE_RULES<<EOF\n'

            printf 'traefik.http.routers.%s-beta.rule=Host(`beta.%s`)\n' \
                    '${{ github.event.repository.name }}' \
                    '${{ env.CANONICAL_DOMAIN }}'

            printf 'EOF\n'
          } >> "$GITHUB_ENV"

      - name: Build Traefik redirect rules to canonical domain
        if: env.IS_DEFAULT_BRANCH == 'true'
        run: |
          {
            printf 'REDIRECT_RULES<<EOF\n'

            printf 'traefik.http.routers.%s-redirect-canonical.entrypoints=https\n' \
                   '${{ github.event.repository.name }}'

            printf 'traefik.http.routers.%s-redirect-canonical.rule=Host(`www.%s`)\n' \
                   '${{ github.event.repository.name }}' \
                   '${{ env.CANONICAL_DOMAIN }}'

            printf 'traefik.http.routers.%s-redirect-canonical.middlewares=%s-redirect-canonical\n' \
                   '${{ github.event.repository.name }}' \
                   '${{ github.event.repository.name }}'

            printf 'traefik.http.middlewares.%s-redirect-canonical.redirectregex.permanent=true\n' \
                   '${{ github.event.repository.name }}'

            printf 'traefik.http.middlewares.%s-redirect-canonical.redirectregex.regex=^https?://.*?/(.*)\n' \
                   '${{ github.event.repository.name }}'

            printf 'traefik.http.middlewares.%s-redirect-canonical.redirectregex.replacement=https://%s/${1}\n' \
                   '${{ github.event.repository.name }}' \
                   '${{ env.CANONICAL_DOMAIN }}'

            printf 'EOF\n'
          } >> "$GITHUB_ENV"

      - name: Extract metadata from build
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # Generate Docker tags based on the following events/attributes.
          # https://github.com/docker/metadata-action#tags-input
          tags: |
            type=ref,event=branch
            # Set latest tag for the default branch.
            type=raw,value=latest,enable={{ is_default_branch }}
          labels: |
            traefik.http.routers.${{ github.event.repository.name }}-${{ github.ref_name }}.entrypoints=https
            traefik.http.routers.${{ github.event.repository.name }}-${{ github.ref_name }}.middlewares=security-headers-web@file

            ${{ env.DOMAIN }}
            ${{ env.BASE_RULES }}
            ${{ env.REDIRECT_RULES }}

      - name: get node version
        id: node-version
        run: |
          version="$(cat .node-version)"
          printf 'VERSION=%s' "${version%.*}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_VERSION=${{ steps.node-version.outputs.VERSION }}
            ORIGIN=${{ env.ORIGIN }}
            PUBLIC_SEO_EXCLUDED_ROUTES=${{ env.PUBLIC_SEO_EXCLUDED_ROUTES }}
            GIT_SHA=${{ env.GIT_SHA }}
            GIT_REF_NAME=${{ env.GIT_REF_NAME }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-deployment:
    runs-on:
      - self-hosted
      - Linux
    needs:
      - docker-image
    if: ${{ github.actor != 'dependabot[bot]' }}

    steps:
      - name: Trigger deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          repository: co-IT/ansible-co-it
          event-type: deploy
          client-payload: |
            {
              "instance": "${{ needs.docker-image.outputs.instance }}",
              "image": "${{ needs.docker-image.outputs.docker-image }}",
              "domain": "${{ needs.docker-image.outputs.domain }}"
            }
